<!DOCTYPE html>
<meta charset="utf-8">
<html lang="en">
  <head>
    <style>

      @import url('https://fonts.googleapis.com/css?family=Lato:400,700');

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #fff;
        font-family: "Lato", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      svg {
        display: block;
      }

      .line {
        fill: none;
        stroke-width: 3px;
      }

      .axis text {
        font-size: 15px;
        fill: #333;
      }

      .axis path,
      .axis line {
        stroke: #999;
        shape-rendering: crispEdges;
      }

      .grid line {
        stroke: #e6e6e6;
        shape-rendering: crispEdges;
      }

      .grid path {
        stroke: none;
      }

      .axis-label {
        font-size: 16px;
        fill: #333;
      }

      .legend text {
        font-size: 15px;
        fill: #333;
      }

    </style>
  </head>

  <body>

    <script src="/js/d3.v4.min.js"></script>

    <svg></svg>

    <script>

      var TOTAL_COLOR  = "#3b759e";
      var CLAUDE_COLOR = "#d97757";

      var margin = { top: 20, right: 30, bottom: 45, left: 55 };
      var parseMonth = d3.timeParse("%Y-%m");

      var svg = d3.select("svg");

      d3.json("commits.json", function(error, data) {
        if (error) throw error;

        data.forEach(function(d) {
          d.date = parseMonth(d.month);
          d.total = +d.total;
          d.claude = +d.claude;
        });

        function render() {

          // size to the iframe viewport so the chart fills it exactly (no scrollbars)
          var width = window.innerWidth,
              height = window.innerHeight;

          var innerWidth = width - margin.left - margin.right,
              innerHeight = height - margin.top - margin.bottom;

          svg.attr("width", width).attr("height", height);
          svg.selectAll("*").remove();

          var g = svg.append("g")
            .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

          var x = d3.scaleTime()
            .domain(d3.extent(data, function(d) { return d.date; }))
            .range([0, innerWidth]);

          var y = d3.scaleLinear()
            .domain([0, d3.max(data, function(d) { return d.total; })])
            .nice()
            .range([innerHeight, 0]);

          // horizontal gridlines
          g.append("g")
            .attr("class", "grid")
            .call(d3.axisLeft(y).ticks(6).tickSize(-innerWidth).tickFormat(""));

          // x axis: yearly ticks for long spans, quarterly for short ones
          var xAxis = d3.axisBottom(x);
          if (data.length > 48) {
            xAxis.ticks(d3.timeYear.every(1)).tickFormat(d3.timeFormat("%Y"));
          } else {
            xAxis.ticks(d3.timeMonth.every(3)).tickFormat(d3.timeFormat("%b %Y"));
          }
          g.append("g")
            .attr("class", "axis")
            .attr("transform", "translate(0," + innerHeight + ")")
            .call(xAxis);

          // y axis
          g.append("g")
            .attr("class", "axis")
            .call(d3.axisLeft(y).ticks(6));

          // y axis label
          g.append("text")
            .attr("class", "axis-label")
            .attr("transform", "rotate(-90)")
            .attr("x", -innerHeight / 2)
            .attr("y", -margin.left + 16)
            .attr("text-anchor", "middle")
            .text("Commits per month");

          function drawSeries(accessor, color) {
            var line = d3.line()
              .x(function(d) { return x(d.date); })
              .y(function(d) { return y(accessor(d)); });

            g.append("path")
              .datum(data)
              .attr("class", "line")
              .style("stroke", color)
              .attr("d", line);

            g.append("g").selectAll("circle")
              .data(data)
              .enter()
              .append("circle")
              .attr("cx", function(d) { return x(d.date); })
              .attr("cy", function(d) { return y(accessor(d)); })
              .attr("r", 3)
              .style("fill", color);
          }

          drawSeries(function(d) { return d.total; }, TOTAL_COLOR);
          drawSeries(function(d) { return d.claude; }, CLAUDE_COLOR);

          // legend (top-left, where the plot is empty)
          var series = [
            { label: "All commits", color: TOTAL_COLOR },
            { label: "Claude co-authored", color: CLAUDE_COLOR }
          ];
          var legend = g.append("g")
            .attr("class", "legend")
            .attr("transform", "translate(8,6)");
          series.forEach(function(s, i) {
            var row = legend.append("g").attr("transform", "translate(0," + (i * 23) + ")");
            row.append("line")
              .attr("x1", 0).attr("x2", 26).attr("y1", 0).attr("y2", 0)
              .style("stroke", s.color).style("stroke-width", 3);
            row.append("circle")
              .attr("cx", 13).attr("cy", 0).attr("r", 3).style("fill", s.color);
            row.append("text").attr("x", 34).attr("y", 5).text(s.label);
          });
        }

        render();
        window.addEventListener("resize", render);

      });

    </script>

  </body>
</html>
